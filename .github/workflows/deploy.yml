name: Ansible AWS CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # -------------------------------------------------------------
  # STAGE 1: TESTING (Continuous Integration via Docker)
  # -------------------------------------------------------------
  test-ansible-code:
    name: Test Ansible Syntax (via Docker)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # We replaced the Python/pip setup with a simple Docker build!
      - name: Build Docker Image
        run: docker buil -t aws-ansible-runner .

      - name: Run Ansible Syntax Check in Docker
        # Notice we are running the container and overriding the command to do a syntax check
        run: docker run aws-ansible-runner ansible-playbook --syntax-check main.yml

  # -------------------------------------------------------------
  # STAGE 2: DEPLOYMENT (Continuous Deployment via Docker)
  # -------------------------------------------------------------
  deploy-to-aws:
    name: Deploy Infrastructure to AWS (via Docker)
    runs-on: ubuntu-latest
    needs: test-ansible-code 
    if: github.ref == 'refs/heads/main' 
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t aws-ansible-runner .

      - name: Deploy Infrastructure using Docker
        # Here we run the container and securely inject the AWS keys from GitHub Secrets
        run: |
          docker run \
            -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            -e AWS_DEFAULT_REGION="us-east-1" \
            aws-ansible-runner
